name: Release

# Cross-compile CGO-free binaries for every desktop OS and attach them to a
# GitHub Release when a v* tag is pushed. Uses scripts/build-release.sh so the
# CI build matches what a contributor produces locally.

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # required to create the release + upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v7.0.1 — pinned by SHA
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      # actions/setup-go v7.0.0 — pinned by SHA
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version: '1.26.x'

      - name: Build release binaries
        run: sh scripts/build-release.sh

      - name: Create release and upload binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "otelstore ${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/otelstore-* dist/SHA256SUMS
